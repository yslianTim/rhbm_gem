name: ci

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >-
          cmake -S . -B build-ci
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_PYTHON_BINDINGS=OFF
          -DRHBM_GEM_BUILD_GUI=OFF

      - name: Build
        run: cmake --build build-ci -j2

      - name: Test
        run: ctest --test-dir build-ci --output-on-failure
